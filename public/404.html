<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Buzzlemax AI</title>
    <script>
      // SPA fallback - redirect to root and let React Router handle the route
      sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
      window.location.href = '/';
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
